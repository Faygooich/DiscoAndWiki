<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Disco&amp;Wiki</title>
<link rel="icon" type="image/png" href="icon.png">
<style>
@font-face {
    font-family: 'DW';
    src: url('font.ttf') format('truetype');
    font-display: block;
}
#scanlines{ position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
:root {
    --bg:         #000000;
    --bg-alt:     #000000;
    --bg-inset:   #000000;
    --bg-warm:    #000000;
    --border:     #ffffff;
    --border-hi:  #ffffff;
    --fg:         #ffffff;
    --fg-dim:     #ffffff;
    --fg-mute:    #ffffff;
    --gold:       #C70F0F;
    --amber:      #C70F0F;
    --cyan:       #C70F0F;
    --pink:       #C70F0F;
    --red:        #C70F0F;
    --green:      #C70F0F;
    --light:      #FFB100;   /* светлый акцент */
    --dark:       #9F3EA6;   /* темный акцент */
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'DW', 'Courier New', monospace;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: none;
    font-smooth: never;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}

html, body { height: 100%; overflow: hidden; }

body {
    background: var(--bg);
    color: var(--fg);
    font-size: 16px;
    line-height: 1.5;
}


/* ─── Layout ──────────────────────────────────────── */
.layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: 100vh;
}

/* ─── Sidebar ─────────────────────────────────────── */
.sidebar {
    background: var(--bg-alt);
    border-right: 3px solid var(--border);
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
}

.logo {
    border: 3px solid var(--gold);
    background: var(--bg-inset);
    padding: 1px 10px;
    text-align: center;
    box-shadow: 5px 5px 0 var(--border);
    margin-bottom: 6px;
    position: relative;
}
.logo-title {
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--fg);
    line-height: 1.1;
}
.logo-disco { color: var(--gold); }
.logo-amp {
    color: var(--pink);
    font-size: 18px;
    margin: 0 4px;
}
.logo-wiki { color: var(--cyan); }
.logo-sub {
    margin-top: 6px;
    font-size: 10px;
    color: var(--fg-mute);
    letter-spacing: 2px;
}

.sidebar-tag {
    margin: 22px 0 8px;
    font-size: 11px;
    color: var(--fg-mute);
    letter-spacing: 1px;
}

nav { display: flex; flex-direction: column; gap: 4px; }

.nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 10px;
    border: 2px solid transparent;
    background: transparent;
    color: var(--fg-dim);
    text-align: left;
    cursor: pointer;
    font-size: 13px;
    line-height: 1.3;
    width: 100%;
    transition: none;
}
.nav-item:hover:not(.disabled) {
    color: var(--fg);
    background: var(--bg-inset);
    border-color: var(--border);
}
.nav-item.active {
    color: var(--bg-inset);
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 3px 3px 0 var(--border);
    font-weight: bold;
}
.nav-item.disabled {
    color: var(--fg-mute);
    cursor: not-allowed;
    opacity: 0.55;
}
.nav-num {
    display: inline-block;
    min-width: 28px;
    padding: 2px 4px;
    text-align: center;
    background: var(--bg-inset);
    color: var(--cyan);
    font-size: 10px;
    border: 1px solid var(--border);
}
.nav-item.active .nav-num {
    background: var(--bg-inset);
    color: var(--gold);
    border-color: var(--bg-inset);
}
.nav-item.disabled .nav-num {
    color: var(--fg-mute);
    background: transparent;
}
.nav-title { flex: 1; }

.sidebar-footer {
    margin-top: auto;
    padding-top: 20px;
    font-size: 10px;
    color: var(--fg-mute);
    letter-spacing: 1px;
    border-top: 1px dashed var(--border);
    text-align: center;
}

/* ─── Content ─────────────────────────────────────── */
.content {
    overflow-y: auto;
    padding: 32px 48px 80px;
    position: relative;
}

.article { display: none; max-width: 920px; }
.article.visible { display: block; }

.breadcrumb {
    font-size: 11px;
    color: var(--fg-mute);
    letter-spacing: 1px;
    margin-bottom: 14px;
}
.breadcrumb span { color: var(--cyan); }

h1.art-title {
    font-size: 30px;
    color: var(--fg);
    line-height: 1.1;
    margin-bottom: 8px;
    padding-bottom: 14px;
    border-bottom: 3px solid var(--gold);
    position: relative;
}
h1.art-title::after {
    content: '';
    position: absolute;
    bottom: -9px;
    left: 0;
    width: 60px;
    height: 3px;
    background: var(--pink);
}
.art-sub {
    color: var(--fg-dim);
    font-size: 14px;
    margin-bottom: 32px;
    margin-top: 10px;
}

h2.sec-title {
    font-size: 18px;
    color: var(--gold);
    margin: 40px 0 16px;
    padding: 8px 12px;
    background: var(--bg-alt);
    border-left: 4px solid var(--gold);
    letter-spacing: 1px;
}
h2.sec-title.light { color: var(--light); border-left-color: var(--light); }
h2.sec-title.dark  { color: var(--dark);  border-left-color: var(--dark); }
h2.sec-title.info  { color: var(--cyan);  border-left-color: var(--cyan); }

h3.sub-title {
    font-size: 15px;
    color: var(--fg);
    margin: 22px 0 10px;
    padding-left: 8px;
    border-left: 2px solid var(--border-hi);
}

p { margin-bottom: 12px; color: #ffffff; }
p.dim { color: #ffffff; font-size: 13px; }

/* ─── Steps ───────────────────────────────────────── */
.steps { display: flex; flex-direction: column; gap: 14px; margin: 18px 0; }
.step {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 14px;
    background: var(--bg-alt);
    border: 2px solid var(--border);
    padding: 14px 16px;
    box-shadow: 4px 4px 0 var(--bg-inset);
}
.step-num {
    background: var(--gold);
    color: var(--bg-inset);
    font-size: 22px;
    text-align: center;
    padding: 6px 0;
    align-self: start;
    font-weight: bold;
    box-shadow: 2px 2px 0 var(--border);
}
.step-body { font-size: 14px; line-height: 1.55; }
.step-body strong { color: var(--gold); }
.step-body .sub { color: var(--fg-dim); font-size: 12px; margin-top: 4px; display: block; }
.step.dark .step-num { background: var(--dark); }
.step.dark .step-body strong { color: var(--dark); }
.step.light .step-num { background: var(--light); }
.step.light .step-body strong { color: var(--light); }

/* ─── Command box ─────────────────────────────────── */
.cmd {
    display: flex;
    align-items: stretch;
    margin: 10px 0;
    border: 2px solid var(--green);
    background: var(--bg-inset);
    box-shadow: 4px 4px 0 var(--border);
    max-width: 420px;
}
.cmd-light {
    display: flex;
    align-items: stretch;
    margin: 10px 0;
    border: 2px solid var(--light);
    background: var(--bg-inset);
    box-shadow: 2px 2px 0 var(--border);
    max-width: 420px;
}
.cmd-prompt {
    background: var(--green);
    color: var(--bg-inset);
    padding: 8px 10px;
    font-size: 13px;
    font-weight: bold;
    border-right: 2px solid var(--green);
}
.cmd-prompt-light {
    background: var(--light);
    color: var(--bg-inset);
    padding: 8px 10px;
    font-size: 13px;
    font-weight: bold;
    border-right: 2px solid var(--light);
}
.cmd-text {
    flex: 1;
    padding: 8px 12px;
    color: var(--green);
    font-size: 14px;
    background: var(--bg-inset);
    user-select: all;
}
.cmd-copy {
    background: transparent;
    color: var(--green);
    border: none;
    border-left: 2px solid var(--green);
    padding: 0 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
}
.cmd-copy-light {
    background: transparent;
    color: var(--light);
    border: none;
    border-left: 2px solid var(--light);
    padding: 0 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
}
.cmd-copy:hover { background: var(--green); color: var(--bg-inset); }
.cmd-copy.copied { background: var(--green); color: var(--bg-inset); }

/* ─── Callouts ────────────────────────────────────── */
.callout {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 12px;
    margin: 18px 0;
    padding: 12px 14px;
    border: 2px solid var(--red);
    background: var(--bg-warm);
    box-shadow: 2px 2px 0 var(--border);
}
.callout.info { border-color: var(--cyan); background: #000000; }
.callout.warn { border-color: var(--amber); background: #000000; }
.callout-icon {
    font-size: 22px;
    text-align: center;
    padding-top: 2px;
    color: var(--red);
}
.callout.info .callout-icon { color: var(--cyan); }
.callout.warn .callout-icon { color: var(--amber); }
.callout-body { font-size: 13px; line-height: 1.55; }
.callout-body b { color: var(--red); }
.callout.info .callout-body b { color: var(--cyan); }
.callout.warn .callout-body b { color: var(--amber); }

/* ─── Grids & boxes ───────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 14px 0; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 14px 0; }

.box {
    background: var(--bg-alt);
    border: 2px solid var(--border);
    padding: 12px 14px;
    box-shadow: 4px 4px 0 var(--bg-inset);
}
.box-title {
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 1px;
}
.box ul { list-style: none; padding: 0; }
.box li {
    padding: 3px 0;
    font-size: 13px;
    color: var(--fg);
    position: relative;
    padding-left: 16px;
}
.box li::before {
    content: '▪';
    position: absolute;
    left: 0;
    color: #dc75d1;
}

/* Locations list with numbers */
.loc-list { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
.loc {
    display: grid;
    grid-template-columns: 38px 1fr;
    align-items: center;
    background: var(--bg-alt);
    border: 2px solid var(--border);
    padding: 8px 12px;
    gap: 12px;
}
.loc-num {
    text-align: center;
    color: var(--pink);
    font-size: 16px;
    background: var(--bg-inset);
    padding: 4px 0;
    border: 1px solid var(--border);
}
.loc-name { background: var(--bg-inset); font-size: 13px; }
.loc-name b { color: var(--fg); }
.loc-name .tag { color: var(--fg-dim); font-size: 11px; margin-left: 4px; }

/* Checklist */
.checklist { margin: 14px 0; }
.check {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px 10px;
    border: 1px dashed var(--border);
    margin-bottom: 6px;
    background: var(--bg-alt);
    font-size: 13px;
}
.check .mark {
    color: var(--cyan);
    font-weight: bold;
    flex-shrink: 0;
}
.check-dark {
    display: flex;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px 10px;
    border: 1px dashed var(--border);
    margin-bottom: 6px;
    background: var(--bg-alt);
    font-size: 13px;
}
.check-dark .mark-dark {
    color: var(--dark);
    font-weight: bold;
    flex-shrink: 0;
}

/* ─── Character sheet ─────────────────────────────── */
.char-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 24px;
}
@media (max-width: 860px) { .char-pair { grid-template-columns: 1fr; } }

.char {
    border: 3px solid var(--gold);
    background: var(--bg-alt);
    box-shadow: 6px 6px 0 var(--bg-inset);
}
.char.dark { border-color: var(--dark); }
.char.light { border-color: var(--light); }

.char-head {
    padding: 14px 16px;
    background: var(--bg-inset);
    border-bottom: 3px solid var(--gold);
}
.char.dark .char-head { border-bottom-color: var(--dark); }
.char.light .char-head { border-bottom-color: var(--light); }
.char-badge {
    display: inline-block;
    padding: 3px 9px;
    background: var(--gold);
    color: var(--bg-inset);
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 6px;
    box-shadow: 2px 2px 0 var(--border);
}
.char.dark .char-badge { background: var(--dark); }
.char.light .char-badge { background: var(--light); }
.char-name {
    font-size: 22px;
    color: var(--fg);
    line-height: 1;
    margin-bottom: 4px;
}
.char-subname {
    font-size: 11px;
    color: var(--fg-dim);
    letter-spacing: 1px;
}

.char-body { padding: 14px 16px; }
.char-sec { margin-bottom: 16px; }
.char-sec-title {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px dashed var(--border);
}
.char.dark .char-sec-title { color: var(--dark); }
.char.light .char-sec-title { color: var(--light); }

.kv {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 2px 0;
}
.kv .k { color: var(--fg-dim); }
.kv .v { color: var(--fg); text-align: right; }

.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
}
.stat {
    background: var(--bg-inset);
    border: 2px solid var(--border);
    text-align: center;
    padding: 6px 2px;
}
.stat.bump { border-color: var(--dark); }
.stat-lbl {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--cyan);
}
.stat-lbl-dark {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--dark);
}
.stat-lbl-light {
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--light);
}
.stat-val {
    font-size: 20px;
    color: var(--fg);
    line-height: 1;
    margin: 2px 0;
}
.stat-mod {
    font-size: 10px;
    color: var(--fg-dim);
}
.stat.bump .stat-mod::after {
    content: ' ↑';
    color: var(--dark);
}

.pill-row { display: flex; flex-wrap: wrap; gap: 4px; }
.pill {
    display: inline-block;
    padding: 3px 8px;
    background: var(--bg-inset);
    border: 1px solid var(--border);
    color: var(--fg);
    font-size: 11px;
}
.pill.gold { color: var(--light); border-color: var(--light); }

.ability {
    margin-bottom: 10px;
    padding: 8px 10px;
    background: var(--bg-inset);
    border-left: 3px solid var(--cyan);
    font-size: 12px;
}
.ability-dark {
    margin-bottom: 10px;
    padding: 8px 10px;
    background: var(--bg-inset);
    border-left: 3px solid var(--dark);
    font-size: 12px;
}
.ability-light {
    margin-bottom: 10px;
    padding: 8px 10px;
    background: var(--bg-inset);
    border-left: 3px solid var(--light);
    font-size: 12px;
}
.ability-name { color: var(--cyan); margin-bottom: 3px; }
.char.dark .ability-name { color: var(--dark); }
.char.light .ability-name { color: var(--light); }

.currency {
    display: flex;
    justify-content: space-between;
    padding: 6px 8px;
    background: var(--bg-inset);
    border: 1px solid var(--border);
    font-size: 12px;
    margin-top: 4px;
}
.currency .coin { color: var(--light); }
.currency .pot  { color: var(--dark); }

/* Bot hint - quoted path through the bot UI */
.bot-hint {
    margin: 10px 0;
    padding: 8px 10px;
    background: var(--bg-inset);
    border: 1px dashed var(--cyan);
    font-size: 11px;
    color: var(--fg-dim);
}
.bot-hint-dark {
    margin: 10px 0;
    padding: 8px 10px;
    background: var(--bg-inset);
    border: 1px dashed var(--dark);
    font-size: 11px;
    color: var(--fg-dim);
}
.bot-hint b { color: var(--cyan); }
.bot-hint-dark b { color: var(--dark); }
.bot-hint .arrow { color: var(--pink); }

/* mobile */
@media (max-width: 800px) {
    html, body { overflow: auto; }
    .layout {
        grid-template-columns: 1fr;
        height: auto;
    }
    .sidebar {
        border-right: none;
        border-bottom: 3px solid var(--border);
        height: auto;
    }
    .content {
        overflow: visible;
        padding: 24px 18px 60px;
    }
    .grid-2 { grid-template-columns: 1fr; }
    h1.art-title { font-size: 24px; }
}
.logo-row {
    display: flex;
    align-items: center;
    justify-content: center; /* можно убрать если хочешь влево */
    gap: 8px;
}

.logo-icon {
    width: 64px;
    height: 64px;
    image-rendering: pixelated;
}

/* Loading state */
.loading {
    padding: 40px;
    color: var(--fg-mute);
    font-size: 13px;
    letter-spacing: 1px;
}
.load-error {
    padding: 16px;
    border: 2px solid var(--red);
    color: var(--fg);
    font-size: 13px;
    margin: 20px 0;
}
</style>
</head>
<body>

<div class="layout">

<!-- ═════════════ SIDEBAR ═════════════ -->
<aside class="sidebar">
<div class="logo">
    <div class="logo-row">
        <img src="icon.png" class="logo-icon">
        <div class="logo-title">
            <span class="logo-disco">DISCO</span><span class="logo-amp">&</span><span class="logo-wiki">WIKI</span>
            <div class="logo-sub">СПРАВОЧНИК</div>
        </div>
    </div>
</div>

    <div class="sidebar-tag">▶ СОЗДАНИЕ</div>
    <nav id="nav-articles"></nav>

    <div class="sidebar-tag">▶ СКОРО</div>
    <nav id="nav-soon"></nav>

    <div class="sidebar-footer">
        @DiscoAndDragonsBot
    </div>
</aside>

<!-- ═════════════ CONTENT ═════════════ -->
<main class="content" id="content-main">
    <div class="loading">ЗАГРУЗКА...</div>
</main>

</div>

<script>
// ─── Article filename parser ───────────────────────
// Filename format:
//   {num}_{name_with_underscores}.html         → обычная статья
//   {num}_{name_with_underscores}_soon.html    → статья «скоро»
function parseFilename(filename){
    var base = filename.replace(/\.html$/i, '');
    var m = base.match(/^(\d+)_(.+)$/);
    if (!m) return null;
    var num = m[1];
    var rest = m[2];
    var isSoon = false;
    if (/_soon$/i.test(rest)) {
        isSoon = true;
        rest = rest.replace(/_soon$/i, '');
    }
    var title = rest.replace(/_/g, ' ');
    return {
        num: num,
        title: title,
        isSoon: isSoon,
        filename: filename,
        id: 'art-' + base   // безопасный id (не зависит от того, читается ли base как валидный)
    };
}

// ─── Show specific article ─────────────────────────
function showArticle(id){
    document.querySelectorAll('.nav-item[data-art]').forEach(function(b){
        b.classList.toggle('active', b.dataset.art === id);
    });
    document.querySelectorAll('.article').forEach(function(a){
        a.classList.toggle('visible', a.id === id);
    });
    var main = document.querySelector('.content');
    if (main) main.scrollTop = 0;
    window.scrollTo(0, 0);
}

// ─── Build sidebar nav button ──────────────────────
function makeNavBtn(art, clickable){
    var el = document.createElement(clickable ? 'button' : 'div');
    el.className = 'nav-item' + (clickable ? '' : ' disabled');
    if (clickable) {
        el.dataset.art = art.id;
        el.addEventListener('click', function(){ showArticle(art.id); });
    }
    var num = document.createElement('span');
    num.className = 'nav-num';
    num.textContent = art.num;
    var ttl = document.createElement('span');
    ttl.className = 'nav-title';
    ttl.textContent = art.title;
    el.appendChild(num);
    el.appendChild(ttl);
    return el;
}

// ─── Build prev/next footer for an article ────────
function buildFooterNav(articles, currentIdx){
    var prev = currentIdx > 0 ? articles[currentIdx - 1] : null;
    var next = currentIdx < articles.length - 1 ? articles[currentIdx + 1] : null;
    if (!prev && !next) return null;

    var wrap = document.createElement('div');
    wrap.style.cssText = 'margin-top:50px; padding-top:24px; border-top:2px dashed var(--border); display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;';

    function makeLink(art, label){
        var b = document.createElement('button');
        b.className = 'nav-item active';
        b.style.cssText = 'display:inline-flex; width:auto; box-shadow:4px 4px 0 var(--border);';
        b.dataset.art = art.id;
        b.addEventListener('click', function(){ showArticle(art.id); });
        var num = document.createElement('span');
        num.className = 'nav-num';
        num.textContent = art.num;
        var ttl = document.createElement('span');
        ttl.className = 'nav-title';
        ttl.textContent = label;
        b.appendChild(num);
        b.appendChild(ttl);
        return b;
    }

    if (prev) wrap.appendChild(makeLink(prev, '← Назад: ' + prev.title));
    else wrap.appendChild(document.createElement('span'));
    if (next) wrap.appendChild(makeLink(next, 'Дальше: ' + next.title + ' →'));

    return wrap;
}

// ─── Main loader ───────────────────────────────────
async function loadArticles(){
    var manifestResp;
    try {
        manifestResp = await fetch('articles.json', { cache: 'no-cache' });
        if (!manifestResp.ok) throw new Error('HTTP ' + manifestResp.status);
    } catch (e) {
        showFatalError('Не удалось загрузить articles.json — ' + e.message +
            '. Сайт нужно открывать через web-сервер (не через file://).');
        return;
    }
    var manifest = await manifestResp.json();
    var filenames = manifest.articles || [];

    // Parse all and split active vs soon
    var parsed = filenames.map(parseFilename).filter(function(x){ return x; });
    // Sort by num so order is stable
    parsed.sort(function(a,b){ return parseInt(a.num,10) - parseInt(b.num,10); });

    var active = parsed.filter(function(p){ return !p.isSoon; });
    var soon   = parsed.filter(function(p){ return p.isSoon; });

    // ── Sidebar: active articles ──
    var navActive = document.getElementById('nav-articles');
    active.forEach(function(art){ navActive.appendChild(makeNavBtn(art, true)); });

    // ── Sidebar: soon articles (disabled) ──
    var navSoon = document.getElementById('nav-soon');
    soon.forEach(function(art){ navSoon.appendChild(makeNavBtn(art, false)); });

    // ── Load article HTML files ──
    var contentMain = document.getElementById('content-main');
    contentMain.innerHTML = ''; // clear loading state

    for (var i = 0; i < active.length; i++) {
        var art = active[i];
        var articleEl = document.createElement('article');
        articleEl.id = art.id;
        articleEl.className = 'article' + (i === 0 ? ' visible' : '');
        try {
            var resp = await fetch(encodeURI(art.filename), { cache: 'no-cache' });
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            articleEl.innerHTML = await resp.text();
        } catch (e) {
            articleEl.innerHTML =
                '<div class="load-error">Не удалось загрузить файл «' + art.filename + '»: ' + e.message + '</div>';
        }
        var footer = buildFooterNav(active, i);
        if (footer) articleEl.appendChild(footer);
        contentMain.appendChild(articleEl);
    }

    // No articles?
    if (active.length === 0) {
        contentMain.innerHTML = '<div class="loading">Нет доступных статей.</div>';
    }
}

function showFatalError(msg){
    var contentMain = document.getElementById('content-main');
    contentMain.innerHTML = '<div class="load-error">' + msg + '</div>';
}

// ─── Copy commands (used by inline onclick in articles) ──
function copyCmd(btn){
    var txt = btn.parentElement.querySelector('.cmd-text').textContent.trim();
    var ok = function(){
        var prev = btn.textContent;
        btn.textContent = '✓ ОК';
        btn.classList.add('copied');
        setTimeout(function(){
            btn.textContent = prev;
            btn.classList.remove('copied');
        }, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(txt).then(ok).catch(function(){
            var ta = document.createElement('textarea');
            ta.value = txt; document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy'); ok(); } catch(e){}
            document.body.removeChild(ta);
        });
    } else {
        var ta = document.createElement('textarea');
        ta.value = txt; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); ok(); } catch(e){}
        document.body.removeChild(ta);
    }
}
window.copyCmd = copyCmd;

// ─── Kick off ──────────────────────────────────────
loadArticles();
</script>
<canvas id="scanlines"></canvas>
<script>
  const slCanvas  = document.getElementById('scanlines');
  const slCtx     = slCanvas.getContext('2d');
  let lineOffsets = [];
  let flickerPhase = 0;

  function buildScanlines() {
    lineOffsets = [];
    let y = 0;
    while (y < slCanvas.height) {
      lineOffsets.push({ y, alpha: 0.10 + Math.random()*0.09, h: Math.random()<0.12?2:1 });
      y += Math.random()<0.3 ? 4 : 3;
    }
  }

  function resizeScanlines() {
    slCanvas.width  = window.innerWidth;
    slCanvas.height = window.innerHeight;
    buildScanlines(); drawScanlines();
  }

  function drawScanlines() {
    slCtx.clearRect(0,0,slCanvas.width,slCanvas.height);
    const cx=slCanvas.width*.48, cy=slCanvas.height*.52;
    const r = Math.max(slCanvas.width,slCanvas.height)*.72;
    const vg = slCtx.createRadialGradient(cx,cy,r*.3,cx,cy,r);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0)');
    slCtx.fillStyle=vg; slCtx.fillRect(0,0,slCanvas.width,slCanvas.height);
    flickerPhase += 0.018;
    const shift = Math.sin(flickerPhase)*0.012 + (Math.random()<0.003 ? Math.random()*0.06 : 0);
    for (const ln of lineOffsets) {
      const extra = Math.random()<0.004 ? 0.07 : 0;
      slCtx.fillStyle = `rgba(0,0,0,${Math.max(0, ln.alpha+shift+extra)})`;
      slCtx.fillRect(0, ln.y, slCanvas.width, ln.h);
    }
  }

  window.addEventListener('resize', () => { resizeScanlines(); });
resizeScanlines();
drawScanlines();
</script>
</body>
</html>
